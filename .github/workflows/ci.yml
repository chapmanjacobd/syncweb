name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  ci:
    name: Continuous Integration
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            web/package-lock.json
            e2e/package-lock.json

      - name: Install dependencies
        run: |
          go mod download
          make web-install

      - name: Run tests
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows often has issues with parallel tests and file locking
            go test -tags noassets ./... -parallel 1
            make build
          else
            make test build
          fi

      - name: Run web tests
        run: make webtest

      - name: Install E2E dependencies
        if: matrix.os == 'ubuntu-latest'
        run: make e2e-install

      - name: Run Playwright tests
        if: matrix.os == 'ubuntu-latest'
        run: make e2e
        env:
          SYNCWEB_BINARY: ${{ github.workspace }}/syncweb
          SYNCWEB_BASE_URL: http://localhost:8889
          CI: true

      - name: Upload test results
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/test-results/
          retention-days: 7

      - name: Upload HTML report
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-html-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Build release binary
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            make release-build GOOS=darwin GOARCH=amd64
            make release-build GOOS=darwin GOARCH=arm64
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            make release-build GOOS=windows GOARCH=amd64
          else
            make release-build GOOS=linux GOARCH=amd64
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "syncweb ${{ github.ref_name }}" \
            --generate-notes \
            --latest \
            --repo ${{ github.repository }} || true

      - name: Upload binaries to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} \
            dist/syncweb-* \
            --repo ${{ github.repository }}
