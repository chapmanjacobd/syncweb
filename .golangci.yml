version: "2"

run:
  timeout: 5m
  tests: true
  build-tags:
    - noassets

linters:
  disable-all: true
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional strict linters
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - decorder
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocritic
    - godot
    - gomoddirectives
    - goprintffuncname
    - gosec
    - grouper
    - importas
    - interfacebloat
    - intrange
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - revive
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - tagalign
    - testableexamples
    - testifylint
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
    - zerologlint

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports

linters-settings:
  gci:
    sections:
      - standard
      - default
      - prefix(github.com/chapmanjacobd/syncweb)
    custom-order: true

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinion
      - performance
      - style
    disabled-checks:
      - whyNoLint

  gofumpt:
    extra-rules: true

  godot:
    scope: all
    exclude:
      - go:generate
    capital: true
    period: true

  goimports:
    local-prefixes: github.com/chapmanjacobd/syncweb

  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G104
      - G115

  maintidx:
    under: 30

  misspell:
    locale: US
    ignore-words: []

  nakedret:
    max-func-lines: 5

  nestif:
    min-complexity: 6

  nilnil:
    checked-types:
      - ptr
      - func
      - iface
      - map
      - chan

  nolintlint:
    allow-unused: false
    allow-leading-space: false
    require-explanation: true
    require-specific: true

  prealloc:
    simple: true
    range-loops: true
    for-loops: true

  revive:
    confidence: 0.8
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id
      - name: waitgroup-by-value
      - name: atomic
      - name: bool-literal-in-expr
      - name: early-return
      - name: get-return
      - name: confusing-naming
      - name: confusing-results
      - name: unused-receiver
      - name: struct-tag
      - name: modifies-value-receiver
      - name: constant-logical-expr
      - name: argument-limit
        arguments: [ 5 ]
      - name: function-length
        arguments: [ 15, 30 ]
      - name: cognitive-complexity
        arguments: [ 25 ]
      - name: max-public-structs
        arguments: [ 10 ]
      - name: add-constant
        arguments:
          - maxLitCount: "3"
            allowStrs: '""'
            allowInts: "0,1,2"
            allowFloats: "0.0,0.,1.0,1.,2.0,2."

  testifylint:
    enable-all: true

  unused:
    field-writes-are-uses: false
    post-statements-are-reads: false
    exported-fields-are-used: false
    parameters-are-used: false
    local-variables-are-used: false
    generated-is-used: false

  whitespace:
    multi-if: true
    multi-func: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - maintidx
        - gocritic
        - gochecknoglobals
        - gochecknoinits
        - errcheck
        - gosec
        - unparam
        - varnamelen
        - forcetypeassert
    - path: cmd/
      linters:
        - gochecknoinits
    - path: internal/
      linters:
        - gochecknoglobals
