version: "2"

run:
  timeout: 5m
  tests: true
  build-tags:
    - noassets

linters:
  disable-all: true
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional strict linters
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - decorder
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocritic
    - godot
    - gomoddirectives
    - goprintffuncname
    - grouper
    - importas
    - interfacebloat
    - intrange
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - revive
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - tagalign
    - testableexamples
    - testifylint
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
    - zerologlint

  exclusions:
    rules:
      # Exclude most linters from test files
      - path: _test\.go
        linters:
          - dupl
          - maintidx
          - gocritic
          - gochecknoglobals
          - gochecknoinits
          - errcheck
          - gosec
          - unparam
          - varnamelen
          - forcetypeassert
          - noctx
          - unused
      # Exclude revive exported/unused-parameter/empty-block from tests
      - path: _test\.go
        text: "unused-parameter"
        linters:
          - revive
      - path: _test\.go
        text: "empty-block"
        linters:
          - revive
      - path: _test\.go
        text: "exported"
        linters:
          - revive
      - path: _test\.go
        text: "SA9003"
        linters:
          - staticcheck
      # Exclude gochecknoinits from cmd/
      - path: cmd/
        linters:
          - gochecknoinits
      # Exclude gochecknoglobals from internal/
      - path: internal/
        linters:
          - gochecknoglobals
      # Exclude revive exported comment requirements
      - path: internal/
        text: "exported:"
        linters:
          - revive
      # Exclude revive unused-parameter
      - path: internal/
        text: "unused-parameter"
        linters:
          - revive
      # Exclude nestif (too strict for complex business logic)
      - path: internal/
        linters:
          - nestif
      # Exclude maintidx (too strict for CLI commands)
      - path: internal/commands/
        linters:
          - maintidx
      # Exclude revive package-comments for internal packages
      - path: internal/
        text: "package-comments"
        linters:
          - revive
      # Exclude revive var-naming for ALL_CAPS consts
      - path: internal/
        text: "don't use ALL_CAPS"
        linters:
          - revive
      # Exclude revive var-naming for trailing underscores
      - path: internal/
        text: "don't use underscores in Go names"
        linters:
          - revive
      # Exclude revive indent-error-flow
      - path: internal/
        text: "indent-error-flow"
        linters:
          - revive
      # Exclude revive var-declaration
      - path: internal/
        text: "var-declaration"
        linters:
          - revive
      # Exclude revive empty-block
      - path: internal/
        text: "empty-block"
        linters:
          - revive
      # Exclude unparam (too strict)
      - path: internal/
        linters:
          - unparam
      # Exclude nilerr (false positive for filepath.WalkDir)
      - path: internal/utils/path_utils.go
        linters:
          - nilerr
      # Exclude gocritic ifElseChain (these are legitimate comparisons, not switch candidates)
      - path: internal/
        text: "ifElseChain"
        linters:
          - gocritic
      # Exclude staticcheck SA9003 for empty branches (sometimes intentional)
      - path: internal/
        text: "SA9003"
        linters:
          - staticcheck
      # Exclude gochecknoglobals for web package
      - path: web/
        linters:
          - gochecknoglobals
      # Exclude gochecknoinits for web package
      - path: web/
        linters:
          - gochecknoinits
      # Exclude gochecknoinits for utils/consts.go (map initialization)
      - path: internal/utils/consts.go
        linters:
          - gochecknoinits
      # Exclude revive package-comments for cmd package
      - path: cmd/
        text: "package-comments"
        linters:
          - revive
      # Exclude nilerr for path_utils.go (false positive)
      - path: internal/utils/path_utils.go
        linters:
          - nilerr

linters-settings:
  gci:
    sections:
      - standard
      - default
      - prefix(github.com/chapmanjacobd/syncweb)
    custom-order: true

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - whyNoLint

  gofumpt:
    extra-rules: true

  godot:
    scope: all
    exclude:
      - go:generate
    capital: true
    period: false

  goimports:
    local-prefixes: github.com/chapmanjacobd/syncweb

  maintidx:
    under: 30

  misspell:
    locale: US
    ignore-words: []

  nakedret:
    max-func-lines: 5

  nestif:
    min-complexity: 6

  nilnil:
    checked-types:
      - ptr
      - func
      - iface
      - map
      - chan

  nolintlint:
    allow-unused: false
    require-explanation: true
    require-specific: true

  prealloc:
    simple: true
    range-loops: true
    for-loops: true

  revive:
    confidence: 0.8
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: var-declaration
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unreachable-code
      - name: redefines-builtin-id
      - name: waitgroup-by-value
      - name: atomic
      - name: bool-literal-in-expr
      - name: early-return
      - name: get-return
      - name: confusing-naming
      - name: confusing-results
      - name: unused-receiver
      - name: struct-tag
      - name: modifies-value-receiver
      - name: constant-logical-expr
      - name: unused-parameter
      - name: argument-limit
        arguments: [ 5 ]
      - name: function-length
        arguments: [ 15, 30 ]
      - name: cognitive-complexity
        arguments: [ 25 ]
      - name: max-public-structs
        arguments: [ 10 ]
      - name: add-constant
        arguments:
          - maxLitCount: "3"
            allowStrs: '""'
            allowInts: "0,1,2"
            allowFloats: "0.0,0.,1.0,1.,2.0,2."

  testifylint:
    enable-all: true

  unused:
    field-writes-are-uses: false
    post-statements-are-reads: false
    exported-fields-are-used: false
    parameters-are-used: false
    local-variables-are-used: false
    generated-is-used: false

  whitespace:
    multi-if: true
    multi-func: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
