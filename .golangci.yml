version: "2"

run:
  timeout: 5m
  tests: true
  build-tags:
    - noassets

issues:
  # Maximum count of issues with the same text.
  # Set to 0 to disable.
  # Default: 3
  max-same-issues: 50

formatters:
  enable:
    - goimports # checks if the code and import statements are formatted according to the 'goimports' command
    - golines # checks if code is formatted, and fixes long lines
    - gci # checks if code and import statements are formatted, with additional rules
    - gofumpt # enforces a stricter format than 'gofmt', while being backwards compatible

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/chapmanjacobd/syncweb)
      custom-order: true

    gofumpt:
      extra-rules: true

    goimports:
      # A list of prefixes, which, if set, checks import paths
      # with the given prefixes are grouped after 3rd-party packages.
      # Default: []
      local-prefixes:
        - github.com/chapmanjacobd/syncweb

    golines:
      # Target maximum line length.
      # Default: 100
      max-len: 120

linters:
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional strict linters (kept from your config, even if golden config disabled them)
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - decorder
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocritic
    - gomoddirectives
    - goprintffuncname
    - grouper
    - importas
    - interfacebloat
    - intrange
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - revive
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - tagalign
    - testableexamples
    - testifylint
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
    - zerologlint

    # Additional linters from golden config (not already enabled)
    - canonicalheader
    - copyloopvar
    - cyclop
    - depguard
    - embeddedstructfieldcheck
    - fatcontext
    - funcorder
    - funlen
    - godoclint
    - iface
    - iotamixing
    - modernize
    - nonamedreturns
    - nilnesserr
    - recvcheck
    - spancheck
    - testpackage
    - tparallel
    - unqueryvet

  settings:
    cyclop:
      # The maximal code complexity to report.
      # Default: 10
      max-complexity: 30
      # The maximal average package complexity.
      # If it's higher than 0.0 (float) the check is enabled.
      # Default: 0.0
      package-average: 10.0

    depguard:
      # Rules to apply.
      rules:
        "non-test files":
          files:
            - "!$test"
          deny:
            - pkg: math/rand$
              desc: Use math/rand/v2 instead, see https://go.dev/blog/randv2
        "non-main files":
          files:
            - "!**/main.go"
          deny:
            - pkg: log$
              desc: Use log/slog instead, see https://go.dev/blog/slog

    embeddedstructfieldcheck:
      # Checks that sync.Mutex and sync.RWMutex are not used as embedded fields.
      # Default: false
      forbid-mutex: true

    errcheck:
      # Report about not checking of errors in type assertions: `a := b.(MyStruct)`.
      # Such cases aren't reported by default.
      # Default: false
      check-type-assertions: true

    exhaustive:
      # Program elements to check for exhaustiveness.
      # Default: [ switch ]
      check:
        - switch
        - map

    funcorder:
      # Checks if the exported methods of a structure are placed before the non-exported ones.
      # Default: true
      struct-method: false

    funlen:
      # Checks the number of lines in a function.
      # If lower than 0, disable the check.
      # Default: 60
      lines: 100
      # Checks the number of statements in a function.
      # If lower than 0, disable the check.
      # Default: 40
      statements: 50

    gochecksumtype:
      # Presence of `default` case in switch statements satisfies exhaustiveness, if all members are not listed.
      # Default: true
      default-signifies-exhaustive: false

    gocognit:
      # Minimal code complexity to report.
      # Default: 30 (but we recommend 10-20)
      min-complexity: 20

    gocritic:
      # Settings passed to gocritic.
      # The settings key is the name of a supported gocritic checker.
      # The list of supported checkers can be found at https://go-critic.com/overview.
      settings:
        captLocal:
          # Whether to restrict checker to params only.
          # Default: true
          paramsOnly: false
        underef:
          # Whether to skip (*x).method() calls where x is a pointer receiver.
          # Default: true
          skipRecvDeref: false

    godoclint:
      # List of rules to enable in addition to the default set.
      # Default: empty
      enable:
        # Assert no unused link in godocs.
        # https://github.com/godoc-lint/godoc-lint?tab=readme-ov-file#no-unused-link
        - no-unused-link
        # Require proper doc links to standard library declarations where applicable.
        # https://github.com/godoc-lint/godoc-lint?tab=readme-ov-file#require-stdlib-doclink
        - require-stdlib-doclink

    govet:
      # Enable all analyzers.
      # Default: false
      enable-all: true
      # Disable analyzers by name.
      # Run `GL_DEBUG=govet golangci-lint run --enable=govet` to see default, all available analyzers, and enabled analyzers.
      # Default: []
      disable:
        - fieldalignment # too strict
      # Settings per analyzer.
      settings:
        shadow:
          # Whether to be strict about shadowing; can be noisy.
          # Default: false
          strict: true

    mnd:
      # List of function patterns to exclude from analysis.
      # Values always ignored: `time.Date`,
      # `strconv.FormatInt`, `strconv.FormatUint`, `strconv.FormatFloat`,
      # `strconv.ParseInt`, `strconv.ParseUint`, `strconv.ParseFloat`.
      # Default: []
      ignored-functions:
        - args.Error
        - flag.Arg
        - flag.Duration.*
        - flag.Float.*
        - flag.Int.*
        - flag.Uint.*
        - os.Chmod
        - os.Mkdir.*
        - os.OpenFile
        - os.WriteFile
        - prometheus.ExponentialBuckets.*
        - prometheus.LinearBuckets

    nakedret:
      # Make an issue if func has more lines of code than this setting, and it has naked returns.
      # Default: 30
      max-func-lines: 0

    nolintlint:
      # Exclude following linters from requiring an explanation.
      # Default: []
      allow-no-explanation: [ funlen, gocognit, golines ]
      # Enable to require an explanation of nonzero length after each nolint directive.
      # Default: false
      require-explanation: true
      # Enable to require nolint directives to mention the specific linter being suppressed.
      # Default: false
      require-specific: true

    perfsprint:
      # Optimizes into strings concatenation.
      # Default: true
      strconcat: false

    reassign:
      # Patterns for global variable names that are checked for reassignment.
      # See https://github.com/curioswitch/go-reassign#usage
      # Default: ["EOF", "Err.*"]
      patterns:
        - ".*"

    rowserrcheck:
      # database/sql is always checked.
      # Default: []
      packages:
        - github.com/jmoiron/sqlx

    sloglint:
      # Enforce not using global loggers.
      # Values:
      # - "": disabled
      # - "all": report all global loggers
      # - "default": report only the default slog logger
      # https://github.com/go-simpler/sloglint?tab=readme-ov-file#no-global
      # Default: ""
      no-global: all
      # Enforce using methods that accept a context.
      # Values:
      # - "": disabled
      # - "all": report all contextless calls
      # - "scope": report only if a context exists in the scope of the outermost function
      # https://github.com/go-simpler/sloglint?tab=readme-ov-file#context-only
      # Default: ""
      context: scope

    staticcheck:
      # SAxxxx checks in https://staticcheck.dev/docs/configuration/options/#checks
      # Example (to disable some checks): [ "all", "-SA1000", "-SA1001"]
      # Default: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
      checks:
        - all
        # Incorrect or missing package comment.
        # https://staticcheck.dev/docs/checks/#ST1000
        - -ST1000
        # Use consistent method receiver names.
        # https://staticcheck.dev/docs/checks/#ST1016
        - -ST1016
        # Omit embedded fields from selector expression.
        # https://staticcheck.dev/docs/checks/#QF1008
        - -QF1008

    usetesting:
      # Enable/disable `os.TempDir()` detections.
      # Default: false
      os-temp-dir: true

    maintidx:
      under: 30

    nilnil:
      checked-types:
        - ptr
        - func
        - iface
        - map
        - chan

    revive:
      confidence: 0.8
      rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: var-declaration
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unreachable-code
      - name: redefines-builtin-id
      - name: waitgroup-by-value
      - name: atomic
      - name: bool-literal-in-expr
      - name: early-return
      - name: get-return
      - name: confusing-naming
      - name: confusing-results
      - name: unused-receiver
      - name: struct-tag
      - name: modifies-value-receiver
      - name: constant-logical-expr
      - name: unused-parameter
      - name: argument-limit
        arguments: [ 5 ]
      - name: function-length
        arguments: [ 15, 30 ]
      - name: cognitive-complexity
        arguments: [ 25 ]
      - name: max-public-structs
        arguments: [ 10 ]
      - name: add-constant
        arguments:
          - maxLitCount: "3"
            allowStrs: '""'
            allowInts: "0,1,2"
            allowFloats: "0.0,0.,1.0,1.,2.0,2."

    tagalign:
      align: false
      sort: true
      strict: false
      order:
        - help
        - required
        - default
        - cmd
        - alias
        - short
        - aliases
        - name
        - env
        - group
        - kong
        - json
        - yaml
        - yml
        - toml
        - mapstructure
        - binding
        - validate

    testifylint:
      enable-all: true

    unused:
      field-writes-are-uses: false
      post-statements-are-reads: false
      exported-fields-are-used: false
      parameters-are-used: false
      local-variables-are-used: false
      generated-is-used: false

    whitespace:
      multi-if: true
      multi-func: true

  exclusions:
    # Log a warning if an exclusion rule is unused.
    # Default: false
    warn-unused: true
    # Predefined exclusion rules.
    # Default: []
    presets:
      - std-error-handling
      - common-false-positives
    # Excluding configuration per-path, per-linter, per-text and per-source.
    rules:
      # Exclude most linters from test files
      - path: _test\.go
        linters:
          - dupl
          - maintidx
          - gocritic
          - gochecknoglobals
          - gochecknoinits
          - errcheck
          - gosec
          - unparam
          - varnamelen
          - forcetypeassert
          - noctx
          - unused
      # Exclude revive exported/unused-parameter/empty-block from tests
      - path: _test\.go
        text: "unused-parameter"
        linters:
          - revive
      - path: _test\.go
        text: "empty-block"
        linters:
          - revive
      - path: _test\.go
        text: "exported"
        linters:
          - revive
      - path: _test\.go
        text: "SA9003"
        linters:
          - staticcheck
      # Exclude gochecknoinits from cmd/
      - path: cmd/
        linters:
          - gochecknoinits
      # Exclude gochecknoglobals from internal/
      - path: internal/
        linters:
          - gochecknoglobals
      # Exclude revive exported comment requirements
      - path: internal/
        text: "exported:"
        linters:
          - revive
      # Exclude revive unused-parameter
      - path: internal/
        text: "unused-parameter"
        linters:
          - revive
      # Exclude nestif (too strict for complex business logic)
      - path: internal/
        linters:
          - nestif
      # Exclude revive package-comments for internal packages
      - path: internal/
        text: "package-comments"
        linters:
          - revive
      # Exclude revive var-naming for ALL_CAPS consts
      - path: internal/
        text: "don't use ALL_CAPS"
        linters:
          - revive
      # Exclude revive var-naming for trailing underscores
      - path: internal/
        text: "don't use underscores in Go names"
        linters:
          - revive
      # Exclude revive indent-error-flow
      - path: internal/
        text: "indent-error-flow"
        linters:
          - revive
      # Exclude revive var-declaration
      - path: internal/
        text: "var-declaration"
        linters:
          - revive
      # Exclude revive empty-block
      - path: internal/
        text: "empty-block"
        linters:
          - revive
      # Exclude gocritic ifElseChain (these are legitimate comparisons, not switch candidates)
      - path: internal/
        text: "ifElseChain"
        linters:
          - gocritic
      # Exclude gochecknoglobals for web package
      - path: web/
        linters:
          - gochecknoglobals
      # Exclude gochecknoinits for web package
      - path: web/
        linters:
          - gochecknoinits
      # Exclude gochecknoinits for utils/consts.go (map initialization)
      - path: internal/utils/consts.go
        linters:
          - gochecknoinits
      # Exclude revive package-comments for cmd package
      - path: cmd/
        text: "package-comments"
        linters:
          - revive
