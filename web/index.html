<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncweb</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --sidebar-bg: #1a1d2b;
            --text-color: #e6e6e6;
            --accent-color: #00d4ff;
            --border-color: #2d324d;
            --hover-color: #25293d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        aside {
            width: 250px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            overflow-y: auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .folder-list, .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .folder-item, .file-item {
            padding: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .folder-item:hover, .file-item:hover {
            background-color: var(--hover-color);
        }
        .folder-item.active {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }
        .file-item {
            border: 1px solid transparent;
        }
        .file-item.drag-over {
            border: 1px dashed var(--accent-color);
            background-color: var(--hover-color);
        }
        .icon { font-size: 1.2rem; }
        .btn {
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn:hover { background: var(--hover-color); }
        #toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: var(--accent-color);
            color: var(--bg-color);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <aside>
        <h2>Syncweb</h2>
        <div id="folder-container">
            <h3>Folders</h3>
            <ul id="folder-list" class="folder-list"></ul>
        </div>
        <div style="margin-top: auto;">
            <button class="btn" onclick="toggleOffline()" id="offline-btn">Go Offline</button>
        </div>
    </aside>
    <main>
        <div class="header">
            <h2 id="current-path">Select a folder</h2>
            <div>
                <button class="btn" onclick="refresh()">Refresh</button>
            </div>
        </div>
        <ul id="file-list" class="file-list"></ul>
    </main>
    <div id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
