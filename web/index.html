<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncweb</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --sidebar-bg: #1a1d2b;
            --text-color: #e6e6e6;
            --accent-color: #00d4ff;
            --border-color: #2d324d;
            --hover-color: #25293d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        aside {
            width: 250px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            overflow-y: auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .folder-list, .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .folder-item, .file-item {
            padding: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .folder-item:hover, .file-item:hover {
            background-color: var(--hover-color);
        }
        .folder-item.active {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }
        .file-item {
            border: 1px solid transparent;
        }
        .file-item.drag-over {
            border: 1px dashed var(--accent-color);
            background-color: var(--hover-color);
        }
        .icon { font-size: 1.2rem; }
        .btn {
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn:hover { background: var(--hover-color); }
        #toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: var(--accent-color);
            color: var(--bg-color);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <aside>
        <h2>Syncweb</h2>
        <div id="folder-container">
            <h3>Folders</h3>
            <ul id="folder-list" class="folder-list"></ul>
        </div>
        <div style="margin-top: auto;">
            <button class="btn" onclick="toggleOffline()" id="offline-btn">Go Offline</button>
        </div>
    </aside>
    <main>
        <div class="header">
            <h2 id="current-path">Select a folder</h2>
            <div>
                <button class="btn" onclick="refresh()">Refresh</button>
            </div>
        </div>
        <ul id="file-list" class="file-list"></ul>
    </main>
    <div id="toast"></div>

    <script>
        let state = {
            folders: [],
            currentFolder: null,
            currentPath: '',
            files: [],
            token: new URLSearchParams(window.location.search).get('token') || ''
        };

        async function fetchAPI(url, options = {}) {
            const headers = {
                'X-Syncweb-Token': state.token,
                'Content-Type': 'application/json',
                ...options.headers
            };
            const resp = await fetch(url, { ...options, headers });
            if (resp.status === 401) {
                const newToken = prompt("Unauthorized. Enter API Token:");
                if (newToken) {
                    state.token = newToken;
                    return fetchAPI(url, options);
                }
            }
            return resp;
        }

        async function loadFolders() {
            try {
                const resp = await fetchAPI('/api/syncweb/folders');
                state.folders = await resp.json();
                renderFolders();
            } catch (e) {
                showToast("Failed to load folders", true);
            }
        }

        function renderFolders() {
            const list = document.getElementById('folder-list');
            list.innerHTML = '';
            state.folders.forEach(f => {
                const li = document.createElement('li');
                li.className = 'folder-item' + (state.currentFolder === f.id ? ' active' : '');
                li.innerHTML = `<span class="icon">📂</span> ${f.id}`;
                li.onclick = () => selectFolder(f.id);
                list.appendChild(li);
            });
        }

        async function selectFolder(id) {
            state.currentFolder = id;
            state.currentPath = `syncweb://${id}/`;
            renderFolders();
            loadFiles();
        }

        async function loadFiles() {
            if (!state.currentFolder) return;
            try {
                const url = `/api/syncweb/ls?folder=${encodeURIComponent(state.currentFolder)}&prefix=${encodeURIComponent(state.currentPath.split('/').slice(3).join('/'))}`;
                const resp = await fetchAPI(url);
                state.files = await resp.json();
                renderFiles();
            } catch (e) {
                showToast("Failed to load files", true);
            }
        }

        function renderFiles() {
            const list = document.getElementById('file-list');
            const pathHeader = document.getElementById('current-path');
            pathHeader.innerText = state.currentPath;
            list.innerHTML = '';

            // Parent dir
            if (state.currentPath !== `syncweb://${state.currentFolder}/`) {
                const li = document.createElement('li');
                li.className = 'file-item';
                li.innerHTML = `<span class="icon">⬆️</span> ..`;
                li.onclick = goUp;
                list.appendChild(li);
            }

            state.files.forEach(f => {
                const li = document.createElement('li');
                li.className = 'file-item';
                li.draggable = true;
                li.innerHTML = `<span class="icon">${f.is_dir ? '📁' : '📄'}</span> ${f.name} ${!f.local ? '☁️' : ''}`;
                
                li.onclick = () => {
                    if (f.is_dir) {
                        state.currentPath = f.path + (f.path.endsWith('/') ? '' : '/');
                        loadFiles();
                    } else if (!f.local) {
                        triggerDownload(f.path);
                    }
                };

                // Drag and Drop
                li.ondragstart = (e) => {
                    e.dataTransfer.setData('text/plain', f.path);
                };

                if (f.is_dir) {
                    li.ondragover = (e) => {
                        e.preventDefault();
                        li.classList.add('drag-over');
                    };
                    li.ondragleave = () => li.classList.remove('drag-over');
                    li.ondrop = async (e) => {
                        e.preventDefault();
                        li.classList.remove('drag-over');
                        const srcPath = e.dataTransfer.getData('text/plain');
                        const dstPath = f.path + '/' + srcPath.split('/').pop();
                        moveFile(srcPath, dstPath);
                    };
                }

                list.appendChild(li);
            });
        }

        function goUp() {
            const parts = state.currentPath.split('/');
            parts.pop(); // Remove trailing empty string
            parts.pop(); // Remove last dir
            state.currentPath = parts.join('/') + '/';
            loadFiles();
        }

        async function moveFile(src, dst) {
            try {
                const resp = await fetchAPI('/api/file/move', {
                    method: 'POST',
                    body: JSON.stringify({ src, dst })
                });
                if (resp.ok) {
                    showToast("Moved successfully");
                    loadFiles();
                } else {
                    showToast("Move failed", true);
                }
            } catch (e) {
                showToast("Move error", true);
            }
        }

        async function triggerDownload(path) {
            try {
                const resp = await fetchAPI('/api/syncweb/download', {
                    method: 'POST',
                    body: JSON.stringify({ path })
                });
                if (resp.ok) showToast("Download triggered");
            } catch (e) {}
        }

        async function toggleOffline() {
            const btn = document.getElementById('offline-btn');
            const isOffline = btn.innerText === 'Go Online';
            try {
                const resp = await fetchAPI('/api/syncweb/toggle', {
                    method: 'POST',
                    body: JSON.stringify({ offline: !isOffline })
                });
                const data = await resp.json();
                btn.innerText = data.offline ? 'Go Online' : 'Go Offline';
                showToast(data.offline ? "Backend Stopped" : "Backend Started");
            } catch (e) {
                showToast("Toggle failed", true);
            }
        }

        async function loadStatus() {
            try {
                const resp = await fetchAPI('/api/syncweb/status');
                const data = await resp.json();
                document.getElementById('offline-btn').innerText = data.offline ? 'Go Online' : 'Go Offline';
            } catch (e) {}
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.background = isError ? '#ff4444' : 'var(--accent-color)';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function refresh() { loadFolders(); loadFiles(); loadStatus(); }

        loadFolders();
        loadStatus();
    </script>
</body>
</html>
